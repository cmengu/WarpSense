# WarpSense Platform — Production Deploy
# Run: ./deploy.sh
# See: .env.example for required environment variables

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shipyard_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: welding_sessions
      POSTGRES_USER: welding_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U welding_user -d welding_sessions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - shipyard_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shipyard_backend
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://welding_user:${DB_PASSWORD}@postgres:5432/welding_sessions
      ENVIRONMENT: production
      DEBUG: "false"
      # Include 127.0.0.1 (browsers treat localhost differently); override via CORS_ORIGINS for remote deploy
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000}"

    ports:
      - "8000:8000"

    networks:
      - shipyard_network

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./my-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: shipyard_frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      NODE_ENV: production

    ports:
      - "3000:3000"

    networks:
      - shipyard_network

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  shipyard_network:
    driver: bridge
