name: Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd my-app && npm install --legacy-peer-deps
      - name: Run type check
        run: cd my-app && npx tsc --noEmit

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v
        env:
          # Required for imports (database.connection loads at module load).
          # CI uses in-memory SQLite; tests that need DB override get_db.
          DATABASE_URL: sqlite:///:memory:

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd my-app && npm install --legacy-peer-deps
      - name: Run tests
        run: cd my-app && npm test -- --passWithNoTests

  esp32-check:
    name: ESP32 Firmware Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ESP32 check
        run: bash scripts/check-esp32.sh
